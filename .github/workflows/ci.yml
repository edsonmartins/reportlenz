# CI do ReportLenz — valida o jrxml-core (tarefa phase-0/1.2).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  jrxml-core:
    name: jrxml-core · lint + typecheck + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jrxml-core
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: jrxml-core/pnpm-lock.yaml

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Testes (Vitest)
        run: pnpm test

      - name: Build (ESM + d.ts)
        run: pnpm build

      # RFC-001 §8 / I-7: o bundle não pode conter dependência de framework de UI.
      - name: Guardião headless (I-7)
        run: |
          if grep -RInE "from ['\"](react|vue|@vue/)" dist/; then
            echo "::error::I-7 violado: import de framework de UI encontrado no bundle"
            exit 1
          fi
          echo "OK: bundle sem imports de UI"

  # Gate G1 (ADR-013): JRXML emitido deve ser aceito pela Library 7.0.7 real.
  jr7-harness:
    name: harness · load+compile na Library 7.0.7
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: jrxml-core/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build do jrxml-core e emissão dos fixtures
        working-directory: jrxml-core
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm emit:fixtures

      - name: Validar com a Library 7.0.7 (load + compile)
        working-directory: tools/jr7-harness
        run: mvn -q -B compile exec:java -Dexec.args="fixtures"

  # Serviço de render (RFC-003): build + testes (incl. smoke da matriz JR7, nota 004).
  render-service:
    name: render-service · build + testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Testes (Spring + matriz JR7)
        working-directory: render-service
        run: mvn -q -B test
