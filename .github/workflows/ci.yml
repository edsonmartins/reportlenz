# CI do ReportLenz — core (TS), designer (React), harness (Library 7.0.7) e render-service (Spring).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  jrxml-core:
    name: jrxml-core · lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Instalar dependências (workspace)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --dir jrxml-core lint

      - name: Typecheck
        run: pnpm --dir jrxml-core typecheck

      - name: Testes (Vitest)
        run: pnpm --dir jrxml-core test

      - name: Build (ESM + d.ts)
        run: pnpm --dir jrxml-core build

      # RFC-001 §8 / I-7: o bundle não pode conter dependência de framework de UI.
      - name: Guardião headless (I-7)
        working-directory: jrxml-core
        run: |
          if grep -RInE "from ['\"](react|vue|@vue/)" dist/; then
            echo "::error::I-7 violado: import de framework de UI encontrado no bundle"
            exit 1
          fi
          echo "OK: bundle sem imports de UI"

  # Casca React do designer (ADR-005/RFC-004, Fase 2).
  jrxml-designer-react:
    name: designer · lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Instalar dependências (workspace)
        run: pnpm install --frozen-lockfile

      # O designer consome o core via workspace — build do core primeiro.
      - name: Build do jrxml-core
        run: pnpm --dir jrxml-core build

      - name: Lint
        run: pnpm --dir jrxml-designer-react lint

      - name: Typecheck
        run: pnpm --dir jrxml-designer-react typecheck

      - name: Testes (Vitest + Testing Library)
        run: pnpm --dir jrxml-designer-react test

      - name: Build (Vite)
        run: pnpm --dir jrxml-designer-react build

  # Gate G1 (ADR-013): JRXML emitido deve ser aceito pela Library 7.0.7 real.
  jr7-harness:
    name: harness · load+compile na Library 7.0.7
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build do jrxml-core e emissão dos fixtures
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir jrxml-core build
          pnpm --dir jrxml-core emit:fixtures

      - name: Validar com a Library 7.0.7 (load + compile)
        working-directory: tools/jr7-harness
        run: mvn -q -B compile exec:java -Dexec.args="fixtures"

      # RFC-002 §7: record(s) Java gerados do contrato devem compilar de verdade.
      - name: Compilar records Java gerados (codegen 3.3)
        run: javac -d /tmp/reportlenz-records tools/jr7-harness/fixtures-java/*.java

  # Serviço de render (RFC-003): build + testes (incl. smoke da matriz JR7, nota 004).
  # A suíte roda DUAS vezes: SQLite (default zero-config) e PostgreSQL
  # (produção — ADR-009, change migracao-postgresql), com o MESMO SQL portável.
  render-service:
    name: render-service · build + testes
    runs-on: ubuntu-latest
    services:
      # Fila do batch (tarefas 5.x) — em dev usa o Redis local/da infra (REDIS_HOST)
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: reportlenz
          POSTGRES_USER: reportlenz
          POSTGRES_PASSWORD: reportlenz
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reportlenz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Testes no SQLite (default)
        working-directory: render-service
        run: mvn -q -B test

      - name: Testes no PostgreSQL (produção)
        working-directory: render-service
        env:
          REPORTLENZ_DB_URL: jdbc:postgresql://localhost:5432/reportlenz
          REPORTLENZ_DB_USER: reportlenz
          REPORTLENZ_DB_PASSWORD: reportlenz
          REPORTLENZ_DB_POOL: "5"
        run: mvn -q -B test
