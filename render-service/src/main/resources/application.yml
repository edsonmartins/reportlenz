spring:
  application:
    name: reportlenz-render
  data:
    redis:
      # Infra do usuário via env (ex.: REDIS_HOST=192.168.1.110); localhost em dev/teste
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  datasource:
    # SQLite = default zero-config (dev); produção aponta REPORTLENZ_DB_URL para
    # PostgreSQL (ADR-009, change migracao-postgresql). Driver inferido pela URL.
    url: ${REPORTLENZ_DB_URL:jdbc:sqlite:${REPORTLENZ_DB_PATH:data/reportlenz.db}}
    username: ${REPORTLENZ_DB_USER:}
    password: ${REPORTLENZ_DB_PASSWORD:}
    hikari:
      # 1 = seguro p/ SQLite (evita SQLITE_BUSY); PostgreSQL em produção usa 10+
      maximum-pool-size: ${REPORTLENZ_DB_POOL:1}
  sql:
    init:
      mode: always

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        # /actuator/prometheus é o alvo de scrape do VictoriaMetrics (RFC-003 §7)
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING:1.0}
  otlp:
    tracing:
      # Tempo (ou collector OTLP) — configurar na infra
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

reportlenz:
  compile-cache:
    # Compartilhado via Redis (ADR-008/change cache-compilacao-redis): chave =
    # sha256(jrxml); false volta ao in-memory puro por instância
    compartilhado: ${REPORTLENZ_COMPILE_CACHE_COMPARTILHADO:true}
    ttl-horas: ${REPORTLENZ_COMPILE_CACHE_TTL_HORAS:24}
  assist:
    # ADR-014: OpenRouter default; base-url OpenAI-compatível — apontar para
    # Ollama/vLLM local mantém inferência local como opt-in (I-4)
    base-url: ${REPORTLENZ_LLM_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${OPENROUTER_API_KEY:}
    model: ${REPORTLENZ_LLM_MODEL:google/gemini-2.5-flash}
    temperature: ${REPORTLENZ_LLM_TEMPERATURE:0.2}
    max-tokens: ${REPORTLENZ_LLM_MAX_TOKENS:16000}
  fila:
    nome: ${REPORTLENZ_FILA:reportlenz:render:fila}
    # Streams (change fila-redis-streams): pendente órfã é reivindicada após este idle
    reivindicar-apos-segundos: ${REPORTLENZ_FILA_REIVINDICAR_APOS:60}
  storage:
    # Padrão MEDIASTORE (integrall-commerce-api): LOCAL (default) ou MINIO
    provider: ${REPORTLENZ_STORAGE_PROVIDER:LOCAL}
    local-path: ${REPORTLENZ_STORAGE_LOCAL_PATH:data/saidas}
    public-base-url: ${REPORTLENZ_STORAGE_PUBLIC_URL:}
    minio:
      # Infra do usuário (ex.: MINIO_ENDPOINT=https://192.168.1.110:9000)
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:}
      secret-key: ${MINIO_SECRET_KEY:}
      bucket: ${MINIO_BUCKET:reportlenz-saidas}
      region: ${MINIO_REGION:us-east-1}
      insecure-tls: ${MINIO_INSECURE_TLS:false}
      # Validade das URLs pré-assinadas (geradas na CONSULTA do job); 0 desliga
      presign-horas: ${REPORTLENZ_STORAGE_PRESIGN_HORAS:24}
