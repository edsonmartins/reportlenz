# Configuração do engine JasperReports no serviço de render (tarefa phase-1/1.2).
#
# Fonte default = DejaVu Sans (embarcada via jasperreports-fonts, com pdfEmbedded):
# garante acentuação pt-BR correta (R$, ç, ã) mesmo em template sem fontName
# explícito — as fontes PDF padrão (Helvetica) não embarcam glifos.
net.sf.jasperreports.default.font.name=DejaVu Sans
